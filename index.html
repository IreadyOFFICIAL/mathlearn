<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Redirecting...</title>


  <script>
    setTimeout(() => {
      window.location.href = "tutorslearnoficiaal.netlify.app"; // change this
    }, 2000);
  </script>

  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #12100e;
      color: white;
      font-family: Arial, sans-serif;
    }

    .box {
      text-align: center;
    }

    .spinner {
      margin-top: 20px;
      width: 40px;
      height: 40px;
      border: 4px solid rgba(255,255,255,0.2);
      border-top: 4px solid white;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="box">
    <h1>Redirecting...</h1>
    <p>Please wait</p>
    <div class="spinner"></div>
  </div>
</body>
</html>
